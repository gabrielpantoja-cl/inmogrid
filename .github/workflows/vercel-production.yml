name: Vercel Production Deployment

# Despliega automaticamente a produccion (inmogrid.cl) en cada push a main.
#
# Este workflow existe porque el plan Hobby de Vercel no permite auto-deploy
# a traves de webhook para repos que viven en una GitHub Organization. Al
# correr `vercel deploy` desde GitHub Actions usamos la CLI, que bypasea esa
# restriccion. Docs: https://vercel.com/guides/how-can-i-use-github-actions-with-vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  # Permite disparar el workflow manualmente desde la UI de GitHub Actions
  workflow_dispatch:

# Cancela ejecuciones previas del mismo workflow si hay pushes mas recientes
concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Summary
        run: |
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment URL: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alias: https://www.inmogrid.cl" >> "$GITHUB_STEP_SUMMARY"
